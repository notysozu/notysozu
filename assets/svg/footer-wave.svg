<svg xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="footer-title footer-desc" viewBox="0 0 1200 180">
  <title id="footer-title">Blueprint route footer</title>
  <desc id="footer-desc">A calm dark footer visual with a small blueprint route line closing the campus-to-cloud theme.</desc>
  <defs>
    <pattern id="footer-grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M24 0H0V24" fill="none" stroke="#1F2937" stroke-width="1"/>
    </pattern>
    <linearGradient id="footer-route" x1="80" y1="0" x2="1120" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#22C55E"/>
      <stop offset="0.35" stop-color="#06B6D4"/>
      <stop offset="0.7" stop-color="#7C3AED"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="180" rx="18" fill="#0D1117"/>
  <rect width="1200" height="180" rx="18" fill="url(#footer-grid)" opacity="0.45"/>
  <path d="M0 124C138 102 240 135 364 109C503 80 573 54 710 79C874 109 1004 132 1200 84V180H0Z" fill="#111827" opacity="0.82"/>
  <path d="M80 96C218 44 334 132 472 84C608 37 712 131 850 83C969 41 1042 79 1120 59" fill="none" stroke="url(#footer-route)" stroke-width="5" stroke-linecap="round"/>
  <path d="M80 96C218 44 334 132 472 84C608 37 712 131 850 83C969 41 1042 79 1120 59" fill="none" stroke="#E6EDF3" stroke-width="1" stroke-dasharray="7 15" opacity="0.35"/>
  <g fill="#0D1117" stroke="#8B949E" stroke-width="1.4">
    <circle cx="80" cy="96" r="7"/>
    <circle cx="472" cy="84" r="7"/>
    <circle cx="850" cy="83" r="7"/>
    <circle cx="1120" cy="59" r="7"/>
  </g>
</svg>
