<svg xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="identity-title identity-desc" viewBox="0 0 1000 360">
  <title id="identity-title">Identity grid for Sonu Kumar Suman</title>
  <desc id="identity-desc">Five compact modules describe an AI-native, full-stack, product-minded, human-centred, ship-and-iterate working style.</desc>
  <defs>
    <pattern id="identity-grid-lines" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M20 0H0V20" fill="none" stroke="#1F2937" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1000" height="360" rx="18" fill="#0D1117"/>
  <rect width="1000" height="360" rx="18" fill="url(#identity-grid-lines)" opacity="0.6"/>
  <rect x="28" y="28" width="944" height="304" rx="14" fill="#111827" stroke="#263244"/>

  <g id="identity-header" font-family="system-ui, -apple-system, Segoe UI, sans-serif">
    <text x="54" y="72" fill="#E6EDF3" font-size="24" font-weight="700">Working identity</text>
    <text x="54" y="101" fill="#8B949E" font-size="15">A compact map for building from campus signals to cloud-ready product surfaces.</text>
  </g>

  <g id="modules" font-family="system-ui, -apple-system, Segoe UI, sans-serif">
    <g id="module-ai-native" transform="translate(54 138)">
      <rect width="164" height="150" rx="10" fill="#0F172A" stroke="#06B6D4"/>
      <circle cx="28" cy="32" r="11" fill="#06B6D4"/>
      <text x="50" y="38" fill="#E6EDF3" font-size="16" font-weight="700">AI-native</text>
      <text x="20" y="77" fill="#8B949E" font-size="13">Models as product</text>
      <text x="20" y="98" fill="#8B949E" font-size="13">material, not magic.</text>
      <path d="M20 119H144" stroke="#06B6D4" stroke-width="2" stroke-dasharray="4 8"/>
    </g>

    <g id="module-full-stack" transform="translate(236 138)">
      <rect width="164" height="150" rx="10" fill="#0F172A" stroke="#22C55E"/>
      <rect x="18" y="21" width="22" height="22" rx="5" fill="#22C55E"/>
      <text x="50" y="38" fill="#E6EDF3" font-size="16" font-weight="700">Full-stack</text>
      <text x="20" y="77" fill="#8B949E" font-size="13">Interface, API, data,</text>
      <text x="20" y="98" fill="#8B949E" font-size="13">deployment path.</text>
      <path d="M20 119H144" stroke="#22C55E" stroke-width="2" stroke-dasharray="4 8"/>
    </g>

    <g id="module-product-minded" transform="translate(418 138)">
      <rect width="164" height="150" rx="10" fill="#0F172A" stroke="#F59E0B"/>
      <path d="M25 20L39 34L25 48L11 34Z" fill="#F59E0B"/>
      <text x="50" y="38" fill="#E6EDF3" font-size="16" font-weight="700">Product-led</text>
      <text x="20" y="77" fill="#8B949E" font-size="13">Start from friction,</text>
      <text x="20" y="98" fill="#8B949E" font-size="13">end with a workflow.</text>
      <path d="M20 119H144" stroke="#F59E0B" stroke-width="2" stroke-dasharray="4 8"/>
    </g>

    <g id="module-human-centred" transform="translate(600 138)">
      <rect width="164" height="150" rx="10" fill="#0F172A" stroke="#A78BFA"/>
      <circle cx="25" cy="27" r="8" fill="#A78BFA"/>
      <path d="M13 48C17 38 33 38 37 48" fill="none" stroke="#A78BFA" stroke-width="3" stroke-linecap="round"/>
      <text x="50" y="38" fill="#E6EDF3" font-size="16" font-weight="700">Human-centred</text>
      <text x="20" y="77" fill="#8B949E" font-size="13">Readable flows, clear</text>
      <text x="20" y="98" fill="#8B949E" font-size="13">states, useful defaults.</text>
      <path d="M20 119H144" stroke="#A78BFA" stroke-width="2" stroke-dasharray="4 8"/>
    </g>

    <g id="module-ship-iterate" transform="translate(782 138)">
      <rect width="164" height="150" rx="10" fill="#0F172A" stroke="#38BDF8"/>
      <path d="M14 39H39L31 24M39 39L31 54" fill="none" stroke="#38BDF8" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="50" y="38" fill="#E6EDF3" font-size="16" font-weight="700">Ship / iterate</text>
      <text x="20" y="77" fill="#8B949E" font-size="13">Small releases, honest</text>
      <text x="20" y="98" fill="#8B949E" font-size="13">feedback, better next.</text>
      <path d="M20 119H144" stroke="#38BDF8" stroke-width="2" stroke-dasharray="4 8"/>
    </g>
  </g>
</svg>
